# Pulsar / SHOWROOTS — nginx site config
# Guardar como: /etc/nginx/sites-available/pulsar
# Después: ln -s /etc/nginx/sites-available/pulsar /etc/nginx/sites-enabled/
# Reemplazá pulsar.tudominio.com y api.pulsar.tudominio.com por tus dominios reales.

# ─────────────────────────────────────────────
# Backend: api.pulsar.tudominio.com  -> gunicorn
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name api.pulsar.tudominio.com;

    client_max_body_size 25M;

    # Django admin static (servido por whitenoise vía gunicorn — OK)
    location /static/ {
        alias /home/deploy/pulsar/backend/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Media — sólo si NO usás Spaces. Si USE_SPACES=True, comentá este bloque.
    location /media/ {
        alias /home/deploy/pulsar/backend/media/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://unix:/run/pulsar.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}

# ─────────────────────────────────────────────
# Frontend: pulsar.tudominio.com  -> Vue build
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name pulsar.tudominio.com;

    root /home/deploy/pulsar/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache largo para assets con hash (Vite genera nombres con hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — todo lo que no es archivo va a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
